name: CI/CD

on: [push, workflow_dispatch]

env:
  PYTHON_MAJOR_VERSION: '3.13'
  PYTHON_VERSION: '3.13.5'

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ffmpeg
        run: choco install ffmpeg

      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install dependencies
        run: python -m pip install .

      - name: Create bundle
        run: |
          $FFPATH = Get-ChildItem 'C:\ProgramData\chocolatey\lib\ffmpeg' -Recurse -Filter ffmpeg.exe |
            Select-Object -First 1 -ExpandProperty FullName
          echo "ffmpeg path: $FFPATH"
          (gc kl_gui.spec) -replace 'tools/ffmpeg.exe', ($FFPATH -replace '\\', '/') | Out-File -encoding UTF8 kl_gui.spec
          pyinstaller kl_gui.spec

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: ${{ github.workspace }}\dist\*.exe
          retention-days: 90


  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install dependencies
        run: python -m pip install .

      - name: Create bundle
        run: |
          FFPATH=$(realpath $(command -v ffmpeg))
          echo "ffmpeg path: $FFPATH"
          sudo sed -i '' "s|tools/ffmpeg.exe|$FFPATH|" kl_gui.spec
          pyinstaller kl_gui.spec

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: ${{ github.workspace }}/dist/*
          retention-days: 90


  ubuntu:
    runs-on:   ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install ffmpeg

      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install dependencies
        run: python -m pip install .

      - name: Create bundle
        run: |
          FFPATH=$(realpath $(command -v ffmpeg))
          echo "ffmpeg path: $FFPATH"
          sudo sed -i "s|tools/ffmpeg.exe|$FFPATH|" kl_gui.spec
          pyinstaller kl_gui.spec

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu
          path: ${{ github.workspace }}/dist/*
          retention-days: 90
